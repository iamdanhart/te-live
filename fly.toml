# fly.toml app configuration file generated for te-live on 2026-05-09T18:07:26-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'te-live'
primary_region = 'ewr'

[build]
  [build.args]
    GO_VERSION = '1.26'

[env]
  PORT = '8080'
  ENFORCE_ADMIN_AUTH = '1'
  ENFORCE_SIGNUP_LIMIT = '1'
  ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
