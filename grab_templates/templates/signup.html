<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up – Live Band Karaoke</title>
    {{template "base-head" .}}
    <link rel="stylesheet" href="/static/signup.css">
    <script src="/static/vendor/htmx.min.js"></script>
</head>
<body>
<form method="post" hx-post="/signup" hx-target="#status">
    <div id="name-bar">
        <label for="name">Your name</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" maxlength="50"
            hx-get="/signup/check-name"
            hx-trigger="input changed delay:400ms"
            hx-target="#name-warning"
            hx-include="this">
        <div id="name-warning"></div>
    </div>

    <input id="search" type="text" placeholder="Search songs or artists..." aria-label="Search songs or artists">

    <div id="catalog-wrapper">
        <table>
            <colgroup><col><col></colgroup>
            <thead>
            <tr>
                <th data-col="title">Title</th>
                <th data-col="artist">Artist</th>
            </tr>
            </thead>
            <tbody id="selected-rows"></tbody>
        </table>
        <div id="unselected-scroll">
            <table>
                <colgroup><col><col></colgroup>
                <tbody id="unselected-rows">
                {{range $i, $s := .Songs}}
                <tr class="catalog-row" data-title="{{$s.Title}}" data-artist="{{$s.Artist}}" data-id="{{$s.ID}}" data-index="{{$i}}">
                    <td>{{$s.Title}}</td>
                    <td>{{$s.Artist}}</td>
                </tr>
                {{end}}
                </tbody>
            </table>
        </div>
    </div>

    <div id="song-inputs"></div>

    <button id="submit-btn" type="submit" disabled>Sign Up</button>
</form>

<dialog id="status-modal">
    <div id="status"></div>
    <button type="button" id="modal-ok">OK</button>
</dialog>

<script src="/static/signup.js"></script>
</body>
</html>
