<!DOCTYPE html>
<html lang="en">
<head>
    <title>Host – Live Band Karaoke</title>
    {{template "base-head" .}}
    <link rel="stylesheet" href="/static/host.css">
    <script src="/static/vendor/htmx.min.js"></script>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h2>Performed</h2>
        <div id="performed-list">
            {{template "host_performed.html" .Performed}}
        </div>
    </div>
    <div class="queue">
        <button id="signup-toggle-btn"
                class="toggle-signups-btn{{if .SignupsOpen}} open{{end}}">
            {{if .SignupsOpen}}Close Signups{{else}}Open Signups{{end}}
        </button>
        <div id="queue-list" hx-get="/host/queue" hx-trigger="every 3s" hx-swap="innerHTML">
            {{template "host_queue.html" .Entries}}
        </div>
    </div>
</div>

<dialog id="remove-dialog">
    <p>Remove <strong id="remove-name"></strong> from the queue?</p>
    <div class="dialog-actions">
        <button class="dialog-cancel-btn">Cancel</button>
        <button class="dialog-confirm-btn">Remove</button>
    </div>
</dialog>

<script src="/static/host.js"></script>
</body>
</html>
