<!DOCTYPE html>
<html style="height: 100%;">
<head>
    {{template "base-head" .}}
    <style>
        body {
            padding: 32px 16px;
            min-height: 100%;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 24px 0;
            color: var(--accent);
        }

        .signup-link {
            display: inline-block;
            padding: 10px 24px;
            background: var(--accent);
            color: #0f0f18;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.05em;
            text-decoration: none;
            margin-bottom: 32px;
        }
        .signup-link:hover { background: #fcd34d; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .card-name {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .warmup {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Troubles End Live Band Karaoke</h1>

    <a class="signup-link" href="/signup">Sign Up</a>

    {{if .Current}}
        <div class="card">
            <div class="card-label">Current Singer</div>
            <div class="card-name">{{.Current.Name}}</div>
        </div>
        {{if .Next}}
        <div class="card">
            <div class="card-label">On Deck</div>
            <div class="card-name">{{.Next.Name}}</div>
        </div>
        {{end}}
    {{else}}
        <p class="warmup">Upcoming singers will be shown after warm-up!</p>
    {{end}}
</div>
</body>
</html>
