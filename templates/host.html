<!DOCTYPE html>
<html style="height: 100%;">
<head>
    {{template "base-head" .}}
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        body {
            padding: 32px 16px;
            min-width: 320px;
        }

        .layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 24px 0;
            color: var(--accent);
        }

        .queue-count {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Performed sidebar */

        .sidebar {
            width: 220px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin: 0 0 12px 0;
        }

        .performed-item {
            margin-bottom: 10px;
        }

        .performed-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .performed-singer {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Queue */

        .queue {
            flex: 1;
            min-width: 0;
        }

        .entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 12px;
        }

        .entry-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .entry-name {
            font-size: 1.1rem;
            font-weight: 700;
            flex: 1;
        }

        .skip-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 12px;
            font-family: inherit;
        }

        .skip-btn:hover {
            border-color: #f87171;
            color: #f87171;
        }

        .entry-songs {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .entry-songs li {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 2px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .entry-songs li span {
            color: var(--text);
        }

        .song-link {
            color: var(--text);
            text-decoration: none;
        }

        .song-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .performed-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 1px 6px;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .performed-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .entry-songs li.song-performed,
        .entry-songs li.song-performed span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .remove-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 12px;
            font-family: inherit;
        }

        .remove-btn:hover {
            border-color: #f87171;
            color: #f87171;
        }

        #remove-dialog {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            padding: 24px 28px;
            max-width: 360px;
            width: 100%;
        }

        #remove-dialog::backdrop {
            background: rgba(0, 0, 0, 0.6);
        }

        #remove-dialog p {
            margin: 0 0 20px 0;
            font-size: 1rem;
        }

        .dialog-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .dialog-cancel-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            padding: 6px 14px;
        }

        .dialog-confirm-btn {
            background: #f87171;
            border: none;
            border-radius: 4px;
            color: #0f0f18;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 14px;
        }

        .add-song-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 12px;
            font-family: inherit;
            margin-top: 10px;
        }

        .add-song-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #add-song-picker {
            margin-top: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
        }

        #add-song-search {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 6px 10px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        #add-song-search:focus {
            outline: none;
            border-color: var(--accent);
        }

        #add-song-results {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .add-song-result {
            font-size: 0.85rem;
            padding: 5px 6px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .add-song-result span {
            color: var(--text);
        }

        .add-song-result:hover {
            background: var(--surface);
            color: var(--text);
        }

        .empty {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .position {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h2>Performed</h2>
        <div id="performed-list">
            {{template "host_performed.html" .}}
        </div>
    </div>
    <div class="queue">
        <div id="queue-list" hx-get="/host/queue" hx-trigger="every 3s" hx-swap="innerHTML">
            {{template "host_queue.html" .}}
        </div>
    </div>
</div>

<dialog id="remove-dialog">
    <p>Remove <strong id="remove-name"></strong> from the queue?</p>
    <div class="dialog-actions">
        <button class="dialog-cancel-btn" onclick="document.getElementById('remove-dialog').close()">Cancel</button>
        <button class="dialog-confirm-btn" onclick="confirmRemove()">Remove</button>
    </div>
</dialog>

<script>
    let songCatalog = null;
    let filteredResults = [];

    function toggleAddSong() {
        const picker = document.getElementById('add-song-picker');
        const isHidden = picker.style.display === 'none' || picker.style.display === '';
        picker.style.display = isHidden ? 'block' : 'none';
        if (isHidden) {
            if (!songCatalog) {
                fetch('/catalog').then(r => r.json()).then(data => {
                    songCatalog = data.songs;
                    renderResults('');
                });
            } else {
                renderResults(document.getElementById('add-song-search').value);
            }
            document.getElementById('add-song-search').focus();
        }
    }

    function renderResults(query) {
        const q = query.toLowerCase();
        filteredResults = songCatalog.filter(s =>
            s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
        );
        const ul = document.getElementById('add-song-results');
        ul.innerHTML = filteredResults.map((s, i) =>
            '<li class="add-song-result" onclick="selectSong(' + i + ')">' +
            '<span>' + s.title + '</span> &mdash; ' + s.artist +
            '</li>'
        ).join('');
    }

    function openRemoveDialog(name) {
        document.getElementById('remove-name').textContent = name;
        document.getElementById('remove-dialog').showModal();
    }

    function confirmRemove() {
        document.getElementById('remove-dialog').close();
        htmx.ajax('POST', '/host/remove', {
            target: '#queue-list',
            swap: 'innerHTML'
        });
    }

    // Pause the queue poll while the add-song picker or remove dialog is open
    // so the swap doesn't destroy them mid-interaction.
    document.body.addEventListener('htmx:beforeRequest', function(evt) {
        if (evt.detail.elt.id === 'queue-list') {
            const picker = document.getElementById('add-song-picker');
            const dialog = document.getElementById('remove-dialog');
            if ((picker && picker.style.display === 'block') || (dialog && dialog.open)) {
                evt.preventDefault();
            }
        }
    });

    function selectSong(i) {
        const song = filteredResults[i];
        htmx.ajax('POST', '/host/add-song', {
            target: '#queue-list',
            swap: 'innerHTML',
            values: {title: song.title, artist: song.artist}
        });
        document.getElementById('add-song-picker').style.display = 'none';
        document.getElementById('add-song-search').value = '';
    }
</script>
</body>
</html>
