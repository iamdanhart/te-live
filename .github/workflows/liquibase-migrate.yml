name: Liquibase Migrate (Prod)

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run Liquibase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Start Fly proxy
        run: flyctl mpg proxy 82ylg01lgmmrzx19 -p 15432 > /tmp/fly-proxy.log 2>&1 &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for proxy
        run: |
          timeout 30 bash -c 'until nc -z localhost 15432; do sleep 3; done' || {
            echo "Proxy failed to start. Output:"
            cat /tmp/fly-proxy.log
            exit 1
          }
      - name: Build Liquibase image
        run: docker build -f Dockerfile.liquibase -t te-live-liquibase .
      - name: Run migrations
        run: |
          docker run --rm --network=host te-live-liquibase \
            --url="jdbc:postgresql://localhost:15432/telive" \
            --username=liquibase-user \
            --password=${{ secrets.MPG_MIGRATE_PASS }} \
            --defaultSchemaName=telive \
            --liquibaseSchemaName=public \
            --search-path=/liquibase/changelog \
            --changeLogFile=root.yaml \
            update