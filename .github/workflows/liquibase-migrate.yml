name: Liquibase Migrate (Prod)

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run Liquibase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check schema.sql and migrations are in sync
        run: |
          LAST_MIGRATION=$(git log -1 --format="%H" -- 'db/changelog/changes/')
          LAST_SCHEMA=$(git log -1 --format="%H" -- 'db/schema.sql')
          if [ "$LAST_MIGRATION" != "$LAST_SCHEMA" ]; then
            echo "db/schema.sql and db/changelog/changes/ were last changed in different commits."
            echo "Last migration commit: $LAST_MIGRATION"
            echo "Last schema.sql commit: $LAST_SCHEMA"
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Start Fly proxy
        run: flyctl mpg proxy 82ylg01lgmmrzx19 -p 15432 &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for proxy
        run: timeout 30 bash -c 'until nc -z localhost 15432; do sleep 3; done'
      - name: Build Liquibase image
        run: docker build -f Dockerfile.liquibase -t te-live-liquibase .
      - name: Run migrations
        run: |
          docker run --rm --network=host te-live-liquibase \
            --url="jdbc:postgresql://localhost:15432/telive?sslmode=disable" \
            --username=liquibase-user \
            --password=${{ secrets.MPG_MIGRATE_PASS }} \
            --defaultSchemaName=telive \
            --liquibaseSchemaName=public \
            --search-path=/liquibase/changelog \
            --changeLogFile=root.yaml \
            update